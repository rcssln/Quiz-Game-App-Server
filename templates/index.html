<!DOCTYPE html>
<html>

<head>
    <title>Quiz Game App Server - Distributed System</title>
    <link rel="stylesheet" href="/static/style.css">
</head>

<body>

    <div class="app-container flex-center">

        <div id="menu" class="card-auth">

            <div class="title-large">Quiz Game App Server</div>

            <div class="input-group">
                <div class="input-wrapper">
                    <input id="name" class="input-field" placeholder="Enter your name">
                </div>

                <div class="input-wrapper">
                    <input class="input-field readonly" value="Room # 1234" readonly>
                </div>
            </div>

            <button class="btn-primary" onclick="createGame()" style="margin-top:10px;">
                Create Game
            </button>

            <button class="btn-primary" onclick="joinGame()">
                Join Game
            </button>

        </div>

        <!-- WAITING -->
        <div id="waitingScreen" class="waiting-screen" style="display:none;">
            <h2>Waiting for your opponent...</h2>
            <p id="waitingRoom" class="room-badge"></p>
        </div>

        <!-- GAME -->
        <div id="game" style="display:none;" class="game-main">

            <div id="turn" class="turn-banner"></div>

            <div id="quiz"></div>

            <!-- Leaderboard -->
            <div class="leaderboard-card">
                <div class="leaderboard-header">
                    <span class="leaderboard-title">Leaderboard</span>
                </div>
                <div id="leaderboard"></div>
            </div>

        </div>

    </div>

    <script src="/static/script.js"></script>
</body>

</html>
